<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check in</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a; color: #f0f0f0;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 2rem;
  }
  h1 { font-size: 15px; font-weight: 400; color: #555; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 2.5rem; text-align: center; }
  .clock { font-size: 80px; font-weight: 300; letter-spacing: -4px; text-align: center; line-height: 1; margin-bottom: 0.5rem; font-variant-numeric: tabular-nums; }
  .clock.warn { color: #EF9F27; }
  .sublabel { font-size: 13px; color: #555; text-align: center; margin-bottom: 2rem; min-height: 18px; }
  .btn-checkin {
    width: 200px; height: 200px; border-radius: 50%;
    background: #1a1a1a; border: 2px solid #333;
    color: #f0f0f0; font-size: 18px; font-weight: 500;
    cursor: pointer; transition: background 0.15s, border-color 0.15s, transform 0.1s;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 8px;
  }
  .btn-checkin:hover { background: #222; border-color: #555; }
  .btn-checkin:active { transform: scale(0.96); }
  .btn-checkin.warn { border-color: #EF9F27; color: #EF9F27; }
  .btn-checkin svg { width: 32px; height: 32px; stroke: currentColor; fill: none; stroke-width: 1.5; }
  .setup { width: 100%; max-width: 360px; }
  .setup-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .setup-row label { font-size: 13px; color: #666; width: 140px; flex-shrink: 0; }
  .setup-row input[type=range] { flex: 1; accent-color: #888; }
  .setup-row span { font-size: 13px; color: #aaa; min-width: 52px; text-align: right; }
  .btn-start {
    width: 100%; padding: 13px; background: #1a1a1a; border: 1px solid #333;
    color: #f0f0f0; font-size: 15px; border-radius: 10px; cursor: pointer;
    margin-top: 8px; transition: background 0.15s;
  }
  .btn-start:hover { background: #222; }
  .warn-bar {
    background: #1a1200; border: 1px solid #EF9F27;
    color: #EF9F27; font-size: 14px; padding: 10px 18px;
    border-radius: 8px; text-align: center; margin-bottom: 1.5rem; display: none;
  }
  .progress-wrap { width: 220px; height: 4px; background: #1a1a1a; border-radius: 2px; margin-bottom: 2rem; }
  .progress-fill { height: 100%; border-radius: 2px; background: #555; transition: width 1s linear; }
  .status-line { margin-top: 2rem; font-size: 13px; color: #333; text-align: center; min-height: 18px; }
  .btn-stop { background: none; border: none; color: #333; font-size: 12px; cursor: pointer; margin-top: 1rem; text-decoration: underline; }
  .btn-stop:hover { color: #888; }
  #running-section { display: none; flex-direction: column; align-items: center; }
</style>
</head>
<body>
<h1>Check-in timer</h1>

<div id="setup-section">
  <div class="setup">
    <div class="setup-row">
      <label>Alert friend after</label>
      <input type="range" id="total-range" min="2" max="30" value="10" step="1">
      <span id="total-val">10 min</span>
    </div>
    <div class="setup-row">
      <label>Warn me</label>
      <input type="range" id="warn-range" min="1" max="5" value="3" step="1">
      <span id="warn-val">3 min early</span>
    </div>
    <button class="btn-start" onclick="startSession()">Start session</button>
  </div>
</div>

<div id="running-section">
  <div class="warn-bar" id="warn-bar">Check in now — your friend will be alerted soon!</div>
  <div class="clock" id="clock">10:00</div>
  <div class="sublabel" id="sublabel">until your friend is alerted</div>
  <div class="progress-wrap"><div class="progress-fill" id="prog" style="width:100%"></div></div>
  <button class="btn-checkin" id="checkin-btn" onclick="checkIn()">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
    Check in
  </button>
  <div class="status-line" id="status-line"></div>
  <button class="btn-stop" onclick="stopSession()">Stop session</button>
</div>

<script>
const DB = 'https://sam-check-in-default-rtdb.firebaseio.com/session.json';
let totalSec, warnSec, remaining, ticker, warnFired = false;

document.getElementById('total-range').addEventListener('input', function() {
  document.getElementById('total-val').textContent = this.value + ' min';
});
document.getElementById('warn-range').addEventListener('input', function() {
  document.getElementById('warn-val').textContent = this.value + ' min early';
});

function fmt(s) {
  const m = Math.floor(Math.max(0,s) / 60), sec = Math.max(0,s) % 60;
  return m + ':' + String(sec).padStart(2, '0');
}

async function writeState(type) {
  const body = { type, ts: Date.now(), totalSec, warnSec };
  try {
    await fetch(DB, { method: 'PUT', body: JSON.stringify(body) });
    document.getElementById('status-line').textContent = type === 'checkin' ? 'Checked in at ' + new Date().toLocaleTimeString() : '';
  } catch(e) {
    document.getElementById('status-line').textContent = 'Write failed — check connection';
  }
}

function startSession() {
  totalSec = parseInt(document.getElementById('total-range').value) * 60;
  const warnMin = Math.min(parseInt(document.getElementById('warn-range').value), parseInt(document.getElementById('total-range').value) - 1);
  warnSec = warnMin * 60;
  remaining = totalSec;
  warnFired = false;

  document.getElementById('setup-section').style.display = 'none';
  const rs = document.getElementById('running-section');
  rs.style.display = 'flex';
  document.getElementById('clock').textContent = fmt(totalSec);

  Notification.requestPermission();
  writeState('start');
  ticker = setInterval(tick, 1000);
}

function tick() {
  remaining--;
  const pct = Math.max(0, remaining / totalSec * 100);
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('clock').textContent = fmt(remaining);

  if (remaining <= warnSec && !warnFired) {
    warnFired = true;
    document.getElementById('warn-bar').style.display = 'block';
    document.getElementById('clock').className = 'clock warn';
    document.getElementById('checkin-btn').className = 'btn-checkin warn';
    writeState('warning');
    if (Notification.permission === 'granted') {
      new Notification('Check in soon', { body: 'Your friend will be alerted in ' + Math.round(warnSec / 60) + ' minutes.', requireInteraction: true });
    }
  }

  if (remaining <= 0) {
    clearInterval(ticker);
    writeState('alert');
    document.getElementById('sublabel').textContent = 'Alert sent to your friend';
  }
}

function checkIn() {
  clearInterval(ticker);
  remaining = totalSec;
  warnFired = false;
  document.getElementById('warn-bar').style.display = 'none';
  document.getElementById('clock').className = 'clock';
  document.getElementById('checkin-btn').className = 'btn-checkin';
  document.getElementById('prog').style.width = '100%';
  document.getElementById('sublabel').textContent = 'until your friend is alerted';
  writeState('checkin');
  ticker = setInterval(tick, 1000);
}

function stopSession() {
  clearInterval(ticker);
  writeState('stop');
  document.getElementById('running-section').style.display = 'none';
  document.getElementById('setup-section').style.display = 'block';
}
</script>
</body>
</html>
